apiVersion: apps/v1
kind: Deployment
metadata:
  name: admin-web
  namespace: loyalty-platform
  labels:
    app: admin-web
    app.kubernetes.io/name: admin-web
    app.kubernetes.io/part-of: loyalty-platform
    app.kubernetes.io/component: admin-web
    app.kubernetes.io/managed-by: kustomize
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: admin-web
  template:
    metadata:
      labels:
        app: admin-web
        app.kubernetes.io/name: admin-web
        app.kubernetes.io/part-of: loyalty-platform
        app.kubernetes.io/component: admin-web
    spec:
      terminationGracePeriodSeconds: 60
      serviceAccountName: admin-web
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - admin-web
                topologyKey: kubernetes.io/hostname
      containers:
        - name: admin-web
          image: loyalty-platform/admin-web:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: admin-web-config
          env:
            - name: API_URL
              valueFrom:
                secretKeyRef:
                  name: loyalty-platform-secrets
                  key: API_URL
            - name: NEXT_PUBLIC_API_URL
              valueFrom:
                secretKeyRef:
                  name: loyalty-platform-secrets
                  key: NEXT_PUBLIC_API_URL
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 300m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
            successThreshold: 1
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 2
            successThreshold: 1
          startupProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 30
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 1001
            runAsGroup: 1001
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
      imagePullSecrets:
        - name: regcred
