apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: loyalty-platform
  labels:
    app: api-gateway
    app.kubernetes.io/name: api-gateway
    app.kubernetes.io/part-of: loyalty-platform
    app.kubernetes.io/component: api-gateway
    app.kubernetes.io/managed-by: kustomize
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
        app.kubernetes.io/name: api-gateway
        app.kubernetes.io/part-of: loyalty-platform
        app.kubernetes.io/component: api-gateway
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3001"
        prometheus.io/path: "/api/v1/metrics"
    spec:
      terminationGracePeriodSeconds: 60
      serviceAccountName: api-gateway
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - api-gateway
                topologyKey: kubernetes.io/hostname
      containers:
        - name: api-gateway
          image: loyalty-platform/api-gateway:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3001
              protocol: TCP
          envFrom:
            - configMapRef:
                name: api-gateway-config
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: loyalty-platform-secrets
                  key: DATABASE_URL
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: loyalty-platform-secrets
                  key: JWT_SECRET
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: loyalty-platform-secrets
                  key: REDIS_URL
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: loyalty-platform-secrets
                  key: REDIS_PASSWORD
            - name: JWT_EXPIRATION
              valueFrom:
                secretKeyRef:
                  name: loyalty-platform-secrets
                  key: JWT_EXPIRATION
            - name: JWT_REFRESH_EXPIRATION
              valueFrom:
                secretKeyRef:
                  name: loyalty-platform-secrets
                  key: JWT_REFRESH_EXPIRATION
            - name: KEYCLOAK_URL
              valueFrom:
                secretKeyRef:
                  name: loyalty-platform-secrets
                  key: KEYCLOAK_URL
            - name: KEYCLOAK_REALM
              valueFrom:
                secretKeyRef:
                  name: loyalty-platform-secrets
                  key: KEYCLOAK_REALM
            - name: KEYCLOAK_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: loyalty-platform-secrets
                  key: KEYCLOAK_CLIENT_ID
            - name: KEYCLOAK_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: loyalty-platform-secrets
                  key: KEYCLOAK_CLIENT_SECRET
            - name: SMTP_HOST
              valueFrom:
                secretKeyRef:
                  name: loyalty-platform-secrets
                  key: SMTP_HOST
            - name: SMTP_PORT
              valueFrom:
                secretKeyRef:
                  name: loyalty-platform-secrets
                  key: SMTP_PORT
            - name: SMTP_USER
              valueFrom:
                secretKeyRef:
                  name: loyalty-platform-secrets
                  key: SMTP_USER
            - name: SMTP_PASS
              valueFrom:
                secretKeyRef:
                  name: loyalty-platform-secrets
                  key: SMTP_PASS
            - name: SMTP_FROM_NAME
              valueFrom:
                secretKeyRef:
                  name: loyalty-platform-secrets
                  key: SMTP_FROM_NAME
            - name: SMTP_FROM_EMAIL
              valueFrom:
                secretKeyRef:
                  name: loyalty-platform-secrets
                  key: SMTP_FROM_EMAIL
            - name: ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: loyalty-platform-secrets
                  key: ENCRYPTION_KEY
            - name: MINIO_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: loyalty-platform-secrets
                  key: MINIO_ENDPOINT
            - name: MINIO_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: loyalty-platform-secrets
                  key: MINIO_ACCESS_KEY
            - name: MINIO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: loyalty-platform-secrets
                  key: MINIO_SECRET_KEY
            - name: MINIO_BUCKET
              valueFrom:
                secretKeyRef:
                  name: loyalty-platform-secrets
                  key: MINIO_BUCKET
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 3001
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
            successThreshold: 1
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 2
            successThreshold: 1
          startupProbe:
            httpGet:
              path: /api/v1/health
              port: 3001
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 30
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 1001
            runAsGroup: 1001
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
      imagePullSecrets:
        - name: regcred
