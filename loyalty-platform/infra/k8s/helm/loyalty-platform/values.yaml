    cpuUtilization: 70
    memoryUtilization: 80
  config:
    NODE_ENV: production
    NEXT_PUBLIC_API_URL: https://api.loyalty.example.com/api/v1
    API_URL: http://api-gateway.loyalty-platform.svc.cluster.local:3001/api/v1
    NEXT_PUBLIC_WS_URL: wss://api.loyalty.example.com
    PORT: "3000"
  lifecycle:
    preStopSleepSeconds: 15
  secrets:
    - name: API_URL
      key: API_URL
    - name: NEXT_PUBLIC_API_URL
      key: NEXT_PUBLIC_API_URL
  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
