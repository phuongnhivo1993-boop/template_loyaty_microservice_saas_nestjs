{{- range $componentKey, $component := dict "api-gateway" .Values.apiGateway "admin-web" .Values.adminWeb "member-web" .Values.memberWeb }}
{{- if $component.hpa.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ $component.name }}
  namespace: {{ $.Values.global.namespace }}
  labels:
    {{- include "loyalty-platform.labels" $ | nindent 4 }}
    app.kubernetes.io/component: {{ $component.name }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ $component.name }}
  minReplicas: {{ $component.hpa.minReplicas }}
  maxReplicas: {{ $component.hpa.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ $component.hpa.cpuUtilization }}
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: {{ $component.hpa.memoryUtilization }}
    {{- if $component.hpa.customMetrics }}
    {{- toYaml $component.hpa.customMetrics | nindent 4 }}
    {{- end }}
  behavior:
    scaleUp:
      stabilizationWindowSeconds: {{ $.Values.autoscaling.behavior.scaleUp.stabilizationWindowSeconds }}
      policies:
        {{- toYaml $.Values.autoscaling.behavior.scaleUp.policies | nindent 8 }}
    scaleDown:
      stabilizationWindowSeconds: {{ $.Values.autoscaling.behavior.scaleDown.stabilizationWindowSeconds }}
      policies:
        {{- toYaml $.Values.autoscaling.behavior.scaleDown.policies | nindent 8 }}
---
{{- end }}
{{- end }}
