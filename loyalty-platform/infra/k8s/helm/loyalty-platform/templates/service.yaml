{{- range $componentKey, $component := dict "api-gateway" .Values.apiGateway "admin-web" .Values.adminWeb "member-web" .Values.memberWeb }}
{{- if $component.enabled }}
{{- $port := $component.port }}
{{- $name := $component.name }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $name }}
  namespace: {{ $.Values.global.namespace }}
  labels:
    {{- include "loyalty-platform.labels" $ | nindent 4 }}
    app.kubernetes.io/component: {{ $name }}
  {{- if eq $name "api-gateway" }}
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: {{ $port | quote }}
    prometheus.io/path: "/api/v1/metrics"
  {{- end }}
spec:
  type: ClusterIP
  ports:
    - name: http
      port: {{ $port }}
      targetPort: {{ $port }}
      protocol: TCP
  selector:
    {{- include "loyalty-platform.selectorLabels" $ | nindent 4 }}
    app.kubernetes.io/component: {{ $name }}
{{- end }}
{{- end }}
