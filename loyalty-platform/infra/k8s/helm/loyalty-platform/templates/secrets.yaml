{{- if .Values.secrets.inline.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.global.namespace }}-secrets
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "loyalty-platform.labels" . | nindent 4 }}
type: Opaque
data:
  {{- range $key, $value := .Values.secrets.inline.data }}
  {{ $key }}: {{ $value | b64enc }}
  {{- end }}
{{- end }}

{{- if .Values.secrets.externalSecrets.enabled }}
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ .Values.global.namespace }}-secrets
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "loyalty-platform.labels" . | nindent 4 }}
spec:
  refreshInterval: "1h"
  secretStoreRef:
    kind: ClusterSecretStore
    name: {{ .Values.secrets.externalSecrets.provider }}-secret-store
  target:
    name: {{ .Values.global.namespace }}-secrets
    creationPolicy: Owner
  data:
    {{- range $key, $value := .Values.secrets.externalSecrets.data }}
    - secretKey: {{ $key }}
      remoteRef:
        key: {{ $value }}
    {{- end }}
{{- end }}

{{- if .Values.secrets.sealedSecrets.enabled }}
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: {{ .Values.global.namespace }}-secrets
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "loyalty-platform.labels" . | nindent 4 }}
spec:
  template:
    type: Opaque
    metadata:
      name: {{ .Values.global.namespace }}-secrets
      namespace: {{ .Values.global.namespace }}
  {{- with .Values.secrets.sealedSecrets.data }}
  encryptedData:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
