{{- if .Values.serviceAccount.create }}
{{- range $componentKey, $component := dict "api-gateway" .Values.apiGateway "admin-web" .Values.adminWeb "member-web" .Values.memberWeb }}
{{- if $component.enabled }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ $component.name }}
  namespace: {{ $.Values.global.namespace }}
  labels:
    {{- include "loyalty-platform.labels" $ | nindent 4 }}
    app.kubernetes.io/component: {{ $component.name }}
  {{- with $.Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
automountServiceAccountToken: false
---
{{- end }}
{{- end }}
{{- end }}
