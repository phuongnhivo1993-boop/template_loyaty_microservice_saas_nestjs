apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: api-gateway-pdb
  namespace: loyalty-platform-production
  labels:
    app: api-gateway
    app.kubernetes.io/name: api-gateway
    app.kubernetes.io/part-of: loyalty-platform
    app.kubernetes.io/component: api-gateway
    environment: production
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: api-gateway
