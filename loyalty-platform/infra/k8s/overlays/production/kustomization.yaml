apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: loyalty-platform-production

namePrefix: prod-

commonLabels:
  environment: production
  app.kubernetes.io/environment: production

resources:
  - ../../base
  - pdb.yaml

patches:
  - path: api-gateway-patch.yaml

configMapGenerator:
  - name: api-gateway-config
    behavior: merge
    literals:
      - NODE_ENV=production
      - LOG_LEVEL=info
  - name: admin-web-config
    behavior: merge
    literals:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=https://api.loyalty.example.com/api/v1
      - NEXT_PUBLIC_WS_URL=wss://api.loyalty.example.com
  - name: member-web-config
    behavior: merge
    literals:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=https://api.loyalty.example.com/api/v1
      - NEXT_PUBLIC_WS_URL=wss://api.loyalty.example.com

replicas:
  - name: api-gateway
    count: 3
  - name: admin-web
    count: 2
  - name: member-web
    count: 2

images:
  - name: loyalty-platform/api-gateway
    newTag: production-latest
  - name: loyalty-platform/admin-web
    newTag: production-latest
  - name: loyalty-platform/member-web
    newTag: production-latest
