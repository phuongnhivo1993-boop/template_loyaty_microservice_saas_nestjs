name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: loyalty-platform
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: loyalty-platform/package-lock.json
      - run: npm ci
      - run: npm run lint

  test:
    name: Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: loyalty-platform
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: test
          POSTGRES_DB: loyalty_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: loyalty-platform/package-lock.json
      - run: npm ci
      - run: npx prisma generate
      - run: npm run test
        env:
          DATABASE_URL: postgresql://postgres:test@localhost:5432/loyalty_test

  build:
    name: Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: loyalty-platform
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: loyalty-platform/package-lock.json
      - run: npm ci
      - run: npx prisma generate
      - run: npm run build
      - run: npm run build --workspace=apps/admin-web 2>/dev/null || true
      - run: npm run build --workspace=apps/member-web 2>/dev/null || true

  docker:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [test, build]
    if: github.ref == 'refs/heads/main'
    defaults:
      run:
        working-directory: loyalty-platform
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build API Gateway
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.api-gateway
          push: false
          tags: loyalty-api-gateway:latest
      - name: Build Admin Web
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.admin-web
          push: false
          tags: loyalty-admin-web:latest
      - name: Build Member Web
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.member-web
          push: false
          tags: loyalty-member-web:latest
